<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>版本歷史</title>
  <link rel="stylesheet" href="css/styles.css">
  <script>
    async function loadHistory() {
      try {
        const res = await fetch('config/version.json');
        const v = await res.json();
        document.title = `版本歷史 • v${v.latest}`;

        const list = document.getElementById('history-list');
        list.innerHTML = '';
        if (Array.isArray(v.history)) {
          v.history.forEach(item => {
            const div = document.createElement('article');
            div.className = 'history-item';
            const title = document.createElement('h2');
            title.textContent = `${item.version}${item.tag ? '（' + item.tag + '）' : ''}`;
            div.appendChild(title);
            const ul = document.createElement('ul');
            (item.notes || []).forEach(n => {
              const li = document.createElement('li');
              li.textContent = n;
              ul.appendChild(li);
            });
            div.appendChild(ul);
            list.appendChild(div);
          });
        } else {
          list.textContent = '無版本歷史資料';
        }
        // try to load webhook config
        try {
          const w = await fetch('config/webhook.json');
          const jw = await w.json();
          window.SHEETS_WEBHOOK_URL = jw.sheetsWebhook || '';
        } catch (e) { window.SHEETS_WEBHOOK_URL = ''; }
      } catch (err) {
        console.error(err);
      }
    }

    document.addEventListener('DOMContentLoaded', () => { loadHistory(); initLogging(); });

    function sendLog(type, page, extra){
      if (window.SHEETS_WEBHOOK_URL) {
        const url = `${window.SHEETS_WEBHOOK_URL}?type=${encodeURIComponent(type)}&page=${encodeURIComponent(page)}&extra=${encodeURIComponent(extra||'')}`;
        const img = new Image(); img.src = url; return;
      }
      fetch('/api/log', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({type, page, extra})}).catch(()=>{});
    }

    function initLogging(){
      sendLog('view','versions');
      // Admin shortcut: Ctrl+Shift+L
      document.addEventListener('keydown', async (e) => {
        if (e.ctrlKey && e.shiftKey && (e.key === 'L' || e.key === 'l')) {
          const pass = prompt('管理密碼：');
          if (!pass) return;
          try {
            if (window.SHEETS_WEBHOOK_URL) {
              const url = `${window.SHEETS_WEBHOOK_URL}?admin_pass=${encodeURIComponent(pass)}`;
              const r = await fetch(url);
              if (r.status === 200) {
                const j = await r.json();
                const w = window.open('about:blank','_blank','width=700,height=600');
                w.document.title = 'Logs';
                w.document.body.style.whiteSpace = 'pre-wrap';
                w.document.body.textContent = JSON.stringify(j.content || 'no logs', null, 2);
              } else {
                alert('密碼錯誤或無法取得日誌');
              }
            } else {
              const r = await fetch(`/api/log?admin_pass=${encodeURIComponent(pass)}`);
              if (r.status === 200) {
                const j = await r.json();
                const w = window.open('about:blank','_blank','width=700,height=600');
                w.document.title = 'Logs';
                w.document.body.style.whiteSpace = 'pre-wrap';
                w.document.body.textContent = j.content || 'no logs';
              } else {
                alert('密碼錯誤或無法取得日誌');
              }
            }
          } catch (err) {
            console.error(err);
            alert('無法取得日誌');
          }
        }
      });
    }
  </script>
</head>
  <body>
  <div class="site">
    <div class="container">
      <header class="header">
        <div class="brand">
          <div class="logo">A</div>
          <div>
            <div class="title">版本歷史</div>
            <div class="small">所有發布記錄</div>
          </div>
        </div>
        <div><a href="index.html" class="btn secondary">回到首頁</a></div>
      </header>

      <section id="history-list" class="history-list">
        <div class="card">正在載入…</div>
      </section>
      <footer>
        <small id="footer-ver">版本</small>
      </footer>
    </div>
  </div>
</body>
</html>
