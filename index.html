<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>版本資訊</title>
  <link rel="stylesheet" href="css/styles.css">
  <script>
    async function loadVersion() {
      try {
        const res = await fetch('config/version.json');
        const v = await res.json();
        // Title
        document.title = `v${v.latest} • 下載`;

        // Populate card
        document.getElementById('ver-number').textContent = `v${v.latest}`;
        const humanDate = new Date(v.releaseDate).toLocaleDateString('zh-TW');
        document.getElementById('ver-date').textContent = humanDate;
        document.getElementById('ver-date-top').textContent = humanDate;
        document.getElementById('ver-size').textContent = v.size;
        document.getElementById('ver-min').textContent = v.minAndroid;

        // Status badge
        const statusWrap = document.getElementById('status-wrap');
        if (v.status === 'Latest'){
          statusWrap.textContent = '🟢 最新版本';
          statusWrap.style.background = '#ecfdf5';
          statusWrap.style.color = 'var(--success)';
        } else {
          statusWrap.textContent = v.status;
        }

        // Download button
        const dl = document.getElementById('download-btn');
        dl.href = v.apk;
        dl.setAttribute('download', '');

        // Footer
        document.getElementById('footer-ver').textContent = `版本 v${v.latest}`;
      } catch (err) {
        console.error('讀取 version.json 發生錯誤', err);
      }
    }

    document.addEventListener('DOMContentLoaded', () => { loadVersion(); initLogging(); });

    function sendLog(type, page, extra){
      fetch('/api/log', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({type, page, extra})}).catch(()=>{});
    }

    function initLogging(){
      // log page view
      sendLog('view','home');
      // download button
      const dl = document.getElementById('download-btn');
      dl.addEventListener('click', ()=> sendLog('download','home', dl.href));

      // Admin shortcut: Ctrl+Shift+L opens admin password prompt (more discoverable than clicking logo 7 times)
      document.addEventListener('keydown', async (e) => {
        if (e.ctrlKey && e.shiftKey && (e.key === 'L' || e.key === 'l')) {
          const pass = prompt('管理密碼：');
          if (!pass) return;
          try {
            const r = await fetch(`/api/log?admin_pass=${encodeURIComponent(pass)}`);
            if (r.status === 200) {
              const j = await r.json();
              const w = window.open('about:blank','_blank','width=700,height=600');
              w.document.title = 'Logs';
              w.document.body.style.whiteSpace = 'pre-wrap';
              w.document.body.textContent = j.content || 'no logs';
            } else {
              alert('密碼錯誤或無法取得日誌');
            }
          } catch (err) {
            console.error(err);
            alert('無法取得日誌');
          }
        }
      });
    }
  </script>
</head>
  <body>
  <div class="site">
    <div class="container">
      <header class="header">
        <div class="brand">
          <div class="logo">A</div>
          <div>
            <div class="title">App 版本資訊</div>
            <div class="small">下載與更新記錄</div>
          </div>
        </div>
        <div class="small">發布日期：<span id="ver-date-top">-</span></div>
      </header>

      <section class="card">
        <div class="version-grid">
          <div class="meta">
            <div><b>目前版本</b> <span id="ver-number">-</span></div>
            <div><b>最新更新</b> <span id="ver-date">-</span></div>
            <div><b>APK 大小</b> <span id="ver-size">-</span></div>
            <div><b>支援</b> <span id="ver-min">-</span></div>
          </div>
          <div style="text-align:center">
            <div id="status-wrap" class="status">-</div>
            <div class="download">
              <a id="download-btn" class="btn" href="#">下載最新版本</a>
              <div style="margin-top:8px"><a class="btn secondary" href="versions.html">版本歷史</a></div>
            </div>
          </div>
        </div>
      </section>

      <footer>
        <small id="footer-ver">版本 -</small>
      </footer>
    </div>
  </div>
</body>
</html>
